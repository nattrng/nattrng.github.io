<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathan Truong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f3;
            --text: #1a1a1a;
            --text-muted: #666;
            --accent: #2a2a2a;
            --dash-color: #1a1a1a;
            --dash-width: 3px;
            --gap: 12px;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            height: calc(100vh - 40px);
            min-height: 500px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .dashed-frame {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 50px 60px 30px;
            position: relative;
            z-index: 1;
        }

        .name {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .name-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .affiliation {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }

        .publications-btn {
            position: relative;
            padding: 14px 28px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .publications-btn:hover {
            color: var(--text-muted);
        }

        .publications-btn span {
            position: relative;
            z-index: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .intro {
            width: 100%;
        }

        .image-gallery {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 12px;
            cursor: grab;
            scrollbar-width: none;
        }

        .image-gallery::-webkit-scrollbar {
            display: none;
        }

        .image-gallery.grabbing {
            cursor: grabbing;
        }

        .profile-image {
            flex: 0 0 auto;
            height: calc(100vh - 340px);
            max-height: 900px;
            width: auto;
            object-fit: cover;
            border-radius: 2px;
            scroll-snap-align: start;
            user-select: none;
            -webkit-user-drag: none;
        }


        .gallery-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .gallery-dots {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(26, 26, 26, 0.08);
            border: 1px solid rgba(26, 26, 26, 0.1);
            border-radius: 100px;
            padding: 10px 16px;
        }

        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--text-muted);
            opacity: 0.3;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .gallery-dot:hover {
            opacity: 0.5;
        }

        .gallery-dot.active {
            width: 28px;
            opacity: 1;
            background: rgba(26, 26, 26, 0.25);
        }

        .gallery-dot.active:hover {
            opacity: 0.8;
        }

        .gallery-dot .dot-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--text);
            border-radius: 4px;
            transition: none;
        }

        .play-pause-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--text-muted);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            margin-left: 4px;
        }

        .play-pause-btn:hover {
            border-color: var(--text);
        }

        .play-pause-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--text);
        }

        .play-pause-btn .pause-icon {
            display: none;
        }

        .play-pause-btn.playing .play-icon {
            display: none;
        }

        .play-pause-btn.playing .pause-icon {
            display: block;
        }

        @media (max-width: 768px) {
            .profile-image {
                height: calc(100vh - 240px);
                max-height: 400px;
            }
        }

        .footer {
            display: flex;
            gap: 32px;
            padding: 0 60px 50px;
            position: relative;
            z-index: 1;
        }

        .footer a {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            position: relative;
            transition: color 0.2s ease;
        }

        .footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text);
            transition: width 0.3s ease;
        }

        .footer a:hover {
            color: var(--text);
        }

        .footer a:hover::after {
            width: 100%;
        }

        .contact-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .contact-wrapper .contact-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            position: relative;
            transition: color 0.2s ease;
            cursor: pointer;
        }

        .contact-wrapper .contact-label::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text);
            transition: width 0.3s ease;
        }

        .contact-wrapper:hover .contact-label,
        .contact-wrapper.active .contact-label {
            color: var(--text);
        }

        .contact-wrapper:hover .contact-label::after,
        .contact-wrapper.active .contact-label::after {
            width: 100%;
        }

        .email-reveal {
            display: inline-flex;
            align-items: center;
            max-width: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: max-width 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .email-reveal::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--text-muted);
            margin: 0 12px;
            flex-shrink: 0;
        }

        .email-reveal a {
            font-size: 0.9rem;
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .email-reveal a:hover {
            color: var(--accent);
        }

        .email-reveal a::after {
            display: none;
        }

        .contact-wrapper.active .email-reveal {
            max-width: 300px;
            opacity: 1;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(245, 245, 243, 0.97);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .overlay-content {
            width: 100%;
            max-width: 700px;
            max-height: 80vh;
            padding: 40px;
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .overlay.active .overlay-content {
            transform: translateY(0);
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .overlay-title {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        .close-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover svg {
            stroke: var(--text-muted);
        }

        .close-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text);
            stroke-width: 2;
            transition: stroke 0.3s ease;
        }

        .publication-list {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .publication-item {
            padding-bottom: 32px;
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
        }

        .publication-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .publication-title {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 8px;
            color: var(--text);
        }

        .publication-authors {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .publication-venue {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .publication-links {
            display: flex;
            gap: 16px;
        }

        .publication-links a {
            font-size: 0.85rem;
            color: var(--text);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px dashed var(--text-muted);
            transition: all 0.2s ease;
        }

        .publication-links a:hover {
            border-color: var(--text);
            background: var(--text);
            color: var(--bg);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state p {
            font-size: 1rem;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { animation: fadeIn 0.6s ease-out 0.3s both; }
        .main-content { animation: fadeIn 0.6s ease-out 0.5s both; }
        .footer { animation: fadeIn 0.6s ease-out 0.7s both; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { height: calc(100vh - 20px); min-height: 400px; }
            .header {
                padding: 20px 20px 0;
                flex-direction: row;
                align-items: center;
                gap: 0;
            }
            .name { font-size: 1.2rem; }
            .affiliation { font-size: 0.75rem; }
            .publications-btn { padding: 8px 16px; font-size: 0.85rem; }
            .main-content { padding: 16px 0; }
            .image-gallery { gap: 10px; padding-left: 20px; padding-right: 20px; }
            .profile-image {
                height: calc(100vh - 200px);
                max-height: 500px;
                border-radius: 6px;
            }
            .gallery-controls { margin-top: 12px; gap: 8px; }
            .gallery-dots { padding: 7px 12px; gap: 5px; }
            .gallery-dot { width: 6px; height: 6px; }
            .gallery-dot.active { width: 22px; }
            .play-pause-btn { width: 28px; height: 28px; }
            .play-pause-btn svg { width: 12px; height: 12px; }
            .footer { padding: 0 20px 20px; gap: 20px; }
            .footer a { font-size: 0.8rem; }
            .contact-wrapper .contact-label { font-size: 0.8rem; }
            .email-reveal a { font-size: 0.8rem; }
            .overlay-content { padding: 24px; }
            .overlay-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashed-frame">
            <svg preserveAspectRatio="none">
                <rect x="1.5" y="1.5" width="calc(100% - 3px)" height="calc(100% - 3px)" rx="0" ry="0"/>
            </svg>
        </div>

        <header class="header">
            <div class="name-block">
                <span class="name">Nathan Truong</span>
                <span class="affiliation">Woodbridge High School</span>
            </div>
            <button class="publications-btn" onclick="openPublications()">
                <span>Publications</span>
            </button>
        </header>

        <main class="main-content">
            <div class="intro">
                <div class="image-gallery" id="gallery">
                    <img src="images_web/IMG_6368.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6354.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6352.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6350.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6345.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6344.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6338.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6329.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6327.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6324.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6320.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6315.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6307.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6239.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6210.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_6181.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_4893.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_4861.jpg" alt="Photo" class="profile-image">
                    <img src="images_web/IMG_4818.jpg" alt="Photo" class="profile-image">
                </div>
                <div class="gallery-controls">
                    <div class="gallery-dots" id="galleryDots"></div>
                    <button class="play-pause-btn" id="playPauseBtn" aria-label="Play slideshow">
                        <svg class="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
                        <svg class="pause-icon" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <footer class="footer">
            <a href="https://github.com/nattrng" target="_blank">GitHub</a>
            <div class="contact-wrapper">
                <span class="contact-label">Contact</span>
                <span class="email-reveal">
                    <a href="mailto:nathanngoctruong@gmail.com">nathanngoctruong@gmail.com</a>
                </span>
            </div>
        </footer>
    </div>

    <div class="overlay" id="publicationsOverlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <h2 class="overlay-title">Publications</h2>
                <button class="close-btn" onclick="closePublications()" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="publication-list">
                <div class="empty-state">
                    <p>None so far.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openPublications() {
            document.getElementById('publicationsOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePublications() {
            document.getElementById('publicationsOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePublications();
        });

        document.getElementById('publicationsOverlay').addEventListener('click', function(e) {
            if (e.target === this) closePublications();
        });

        const contactWrapper = document.querySelector('.contact-wrapper');
        const contactLabel = document.querySelector('.contact-label');

        contactLabel.addEventListener('click', function(e) {
            e.stopPropagation();
            contactWrapper.classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            if (!contactWrapper.contains(e.target)) {
                contactWrapper.classList.remove('active');
            }
        });

        // Horizontal scroll gallery with drag support
        const gallery = document.getElementById('gallery');
        let isDown = false;
        let startX;
        let scrollLeft;

        gallery.addEventListener('mousedown', (e) => {
            isDown = true;
            gallery.classList.add('grabbing');
            startX = e.pageX - gallery.offsetLeft;
            scrollLeft = gallery.scrollLeft;
        });

        gallery.addEventListener('mouseleave', () => {
            isDown = false;
            gallery.classList.remove('grabbing');
        });

        gallery.addEventListener('mouseup', () => {
            isDown = false;
            gallery.classList.remove('grabbing');
        });

        gallery.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - gallery.offsetLeft;
            const walk = (x - startX) * 1.5;
            gallery.scrollLeft = scrollLeft - walk;
        });

        // Allow horizontal scroll with mouse wheel
        gallery.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                e.preventDefault();
                gallery.scrollLeft += e.deltaY;
            }
        }, { passive: false });

        // Gallery dots and autoplay
        const images = gallery.querySelectorAll('.profile-image');
        const dotsContainer = document.getElementById('galleryDots');
        const playPauseBtn = document.getElementById('playPauseBtn');
        let autoplayInterval = null;
        let currentIndex = 0;

        const AUTOPLAY_DURATION = 7000;
        let progressRAF = null;
        let progressStart = null;

        // Create dots with inner progress bar
        images.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
            dot.setAttribute('aria-label', 'Go to image ' + (i + 1));
            const progressBar = document.createElement('span');
            progressBar.className = 'dot-progress';
            dot.appendChild(progressBar);
            dot.addEventListener('click', () => {
                scrollToImage(i);
                if (autoplayInterval) {
                    startAutoplay();
                }
            });
            dotsContainer.appendChild(dot);
        });

        function scrollToImage(index) {
            const img = images[index];
            if (!img) return;
            gallery.scrollTo({ left: img.offsetLeft - gallery.offsetLeft, behavior: 'smooth' });
        }

        function setActiveDot(index) {
            currentIndex = index;
            dotsContainer.querySelectorAll('.gallery-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
                dot.querySelector('.dot-progress').style.width = '0%';
            });
        }

        function updateDots() {
            const sl = gallery.scrollLeft;
            const galleryWidth = gallery.scrollWidth - gallery.clientWidth;
            const progress = galleryWidth > 0 ? sl / galleryWidth : 0;
            const newIndex = Math.round(progress * (images.length - 1));
            if (newIndex !== currentIndex) {
                setActiveDot(newIndex);
                if (autoplayInterval) {
                    progressStart = performance.now();
                }
            }
        }

        gallery.addEventListener('scroll', updateDots);

        function animateProgress(timestamp) {
            if (!progressStart) progressStart = timestamp;
            const elapsed = timestamp - progressStart;
            const pct = Math.min((elapsed / AUTOPLAY_DURATION) * 100, 100);
            const activeDot = dotsContainer.querySelector('.gallery-dot.active .dot-progress');
            if (activeDot) activeDot.style.width = pct + '%';
            if (autoplayInterval) {
                progressRAF = requestAnimationFrame(animateProgress);
            }
        }

        function startAutoplay() {
            stopAutoplay();
            playPauseBtn.classList.add('playing');
            progressStart = performance.now();
            progressRAF = requestAnimationFrame(animateProgress);
            autoplayInterval = setInterval(() => {
                currentIndex++;
                if (currentIndex >= images.length) currentIndex = 0;
                setActiveDot(currentIndex);
                scrollToImage(currentIndex);
                progressStart = performance.now();
            }, AUTOPLAY_DURATION);
        }

        function stopAutoplay() {
            playPauseBtn.classList.remove('playing');
            if (autoplayInterval) {
                clearInterval(autoplayInterval);
                autoplayInterval = null;
            }
            if (progressRAF) {
                cancelAnimationFrame(progressRAF);
                progressRAF = null;
            }
            // Reset all progress bars
            dotsContainer.querySelectorAll('.dot-progress').forEach(bar => {
                bar.style.width = '0%';
            });
        }

        playPauseBtn.addEventListener('click', () => {
            if (autoplayInterval) {
                stopAutoplay();
            } else {
                startAutoplay();
            }
        });

        // Stop autoplay on user interaction
        gallery.addEventListener('mousedown', stopAutoplay);
        gallery.addEventListener('touchstart', stopAutoplay);
    </script>
</body>
</html>
